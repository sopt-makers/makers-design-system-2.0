name: Setup Node and pnpm
description: Set up pnpm, restore pnpm cache from lockfile state, and install dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: true
  pnpm-version:
    description: pnpm version to install.
    required: true
  cache-dependency-path:
    description: Path to the lockfile used for pnpm cache invalidation.
    required: false
    default: pnpm-lock.yaml
  install:
    description: Whether to install dependencies after setup.
    required: false
    default: "true"
  install-command:
    description: Command used to install dependencies.
    required: false
    default: pnpm install --frozen-lockfile
  working-directory:
    description: Directory where the install command should run.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.install-command }}
